name: Check Remote Release and Build Runtime

on:
  schedule:
    - cron: '0 */6 * * *' # Runs automatically every 6 hours
  workflow_dispatch:      # Allows manual trigger

permissions:
  contents: write
  packages: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Get latest release metadata
      - name: Get latest remote release
        id: remote_version
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/tadelv/reaprime/releases/latest | jq -r '.tag_name')
          # Remove 'v' prefix if it exists to get the raw version number (e.g., 0.7.9)
          VERSION_NUM=$(echo "$LATEST_TAG" | sed 's/^v//')
          echo "Latest remote release tag is: $LATEST_TAG"
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION_NUM" >> $GITHUB_OUTPUT

      # Step 2: Check out your automation tracking repo
      - name: Check out your automation repo
        uses: actions/checkout@v4

      # Step 3: Verify if new version
      - name: Verify if new version
        id: check_new
        run: |
          VERSION_FILE="last_built_release.txt"
          LOCAL_VERSION=""
          if [ -f "$VERSION_FILE" ]; then
            LOCAL_VERSION=$(cat $VERSION_FILE)
          fi
          
          if [ "$LOCAL_VERSION" = "${{ steps.remote_version.outputs.tag }}" ]; then
            echo "No new release found. Skipping build."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "New release detected! Proceeding to build."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      # Step 4: Dynamically generate the runtime Dockerfile
      - name: Create Runtime Dockerfile
        if: steps.check_new.outputs.should_build == 'true'
        run: |
          cat << 'EOF' > Dockerfile
          FROM ubuntu:22.04

          ENV DEBIAN_FRONTEND=noninteractive

          # Install Flutter runtime libs PLUS virtual framebuffer (Xvfb) and X11 extensions
          RUN apt-get update && apt-get install -y \
              curl \
              tar \
              libgtk-3-0 \
              libblkid1 \
              liblzma5 \
              libgcrypt20 \
              libglib2.0-0 \
              libx11-xcb1 \
              libxss1 \
              xvfb \
              && rm -rf /var/lib/apt/lists/*

          WORKDIR /app

          ARG VERSION
          RUN curl -L -o decent.tar.gz "https://github.com/tadelv/reaprime/releases/download/v${VERSION}/decent-linux-x64-${VERSION}.tar.gz" \
              && tar -xzf decent.tar.gz --strip-components=1 \
              && rm decent.tar.gz

          EXPOSE 3000 8080 8081

          # Wrap the execution in Xvfb with a virtual 1280x800 screen resolution
          CMD ["xvfb-run", "--server-args=-screen 0 1280x800x24", "./decent"]
          EOF
      # Step 5: Set up Docker Buildx
      - name: Set up Docker Buildx
        if: steps.check_new.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      # Step 6: Log in to GHCR
      - name: Log in to GitHub Container Registry
        if: steps.check_new.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 7: Extract Metadata Tags
      - name: Extract Docker metadata
        if: steps.check_new.outputs.should_build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.remote_version.outputs.tag }}

      # Step 8: Build and Push utilizing the version argument
      - name: Build and push Docker image
        if: steps.check_new.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.remote_version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# Step 9: Re-fetch your automation repo and write the new tag to cache
      - name: Update version cache file
        if: steps.check_new.outputs.should_build == 'true'
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git tracking-repo
          cd tracking-repo
          echo "${{ steps.remote_version.outputs.tag }}" > last_built_release.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_built_release.txt
          
          # Only commit and push if changes actually exist in the working directory
          if ! git diff-index --quiet HEAD; then
            git commit -m "Update cached release version to ${{ steps.remote_version.outputs.tag }} [skip ci]"
            git push origin main
          else
            echo "No file changes detected. Skipping cache commit."
          fi
